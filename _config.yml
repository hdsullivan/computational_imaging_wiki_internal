title: Computational Imaging Wiki
description: A community resource hub for papers, datasets, and code in computational imaging.

remote_theme: just-the-docs/just-the-docs

# Enable full-text search
search_enabled: true
search:
  heading_level: 2
  previews: 3
  preview_words_before: 5
  preview_words_after: 10
  tokenizer_separator: /[\s/]+/
  rel_url: true
  button: false

# Footer
footer_content: "Maintained by the computational imaging research community. Contributions welcome via <a href='https://github.com/hdsullivan/computational_imaging_wiki_internal'>GitHub</a>."

# Callouts
callouts_level: quiet
callouts:
  highlight:
    color: yellow
  important:
    title: Important
    color: blue
  new:
    title: New
    color: green
  note:
    title: Note
    color: purple

# Permalink style
permalink: pretty

# Exclude from build
exclude:

  - "*.sh"
